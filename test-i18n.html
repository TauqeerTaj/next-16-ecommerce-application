    <title>Language Test</title>
    <script>
        // Test language switching
        function switchLanguage(lang) {
            console.log('Switching to:', lang);
            // This would trigger language change in your app
            // In a real app, you'd call your language context function
        }
    </script>
</head>
<body>
    <h1>Language System Test</h1>
    <p>Current language should change when you select from dropdown.</p>
    
    <h2>Test Translations:</h2>
    <div id="translations">
        <p>English: <span id="title">Exclusive</span>, <span id="summer-sale">Summer Sale...</span></p>
        <p>Spanish: <span id="title">Exclusivo</span>, <span id="summer-sale">Venta de Verano...</span></p>
        <p>French: <span id="title">Exclusif</span>, <span id="summer-sale">Vente d'Été...</span></p>
    </div>
    
    <button onclick="switchLanguage('en')">English</button>
    <button onclick="switchLanguage('es')">Español</button>
    <button onclick="switchLanguage('fr')">Français</button>
